name: Release

on:
  push:
    tags:
      # Match tags in the format of "major.minor.patch", e.g., "1.2.3"
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  TAURI_RAW_NAME: "hoyo_gacha"
  TAURI_PRODUCT_NAME: "HoYo.Gacha"

jobs:
  build:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust environment
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node and setup cache
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install app dependencies
        run: pnpm install

      - name: Lint code
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      # Release build, not 'cicd'
      - name: Build app
        run: pnpm build

      - name: Get short git commit sha
        id: short-sha
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Prepare executable and PDB files
        shell: bash
        run: |
          mkdir -p "${{ github.workspace }}/unsigned"
          cp \
            "${{ github.workspace }}/target/release/${{ env.TAURI_RAW_NAME }}.exe" \
            "${{ github.workspace }}/unsigned/${{ env.TAURI_PRODUCT_NAME }}.exe"
          cp \
            "${{ github.workspace }}/target/release/${{ env.TAURI_RAW_NAME }}.pdb" \
            "${{ github.workspace }}/unsigned/${{ env.TAURI_PRODUCT_NAME }}.pdb"
          echo "Executable and PDB files prepared in unsigned directory"
          find "${{ github.workspace }}/unsigned" -maxdepth 1 -type f

      - name: Upload unsigned executable
        uses: actions/upload-artifact@v7
        id: upload-unsigned-exe
        with:
          archive: false
          path: ${{ github.workspace }}/unsigned/${{ env.TAURI_PRODUCT_NAME }}.exe
          retention-days: 1

      - name: Upload PDB file
        uses: actions/upload-artifact@v7
        id: upload-unsigned-pdb
        with:
          archive: false
          path: ${{ github.workspace }}/unsigned/${{ env.TAURI_PRODUCT_NAME }}.pdb
          retention-days: 1

    outputs:
      exe-artifact-id: ${{ steps.upload-unsigned-exe.outputs.artifact-id }}
      pdb-artifact-id: ${{ steps.upload-unsigned-pdb.outputs.artifact-id }}

  sign:
    name: Sign and Release
    runs-on: windows-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download unsigned artifact
        uses: actions/download-artifact@v8
        with:
          artifact-ids: |
            ${{ needs.build.outputs.exe-artifact-id }}
            ${{ needs.build.outputs.pdb-artifact-id }}
          path: ${{ github.workspace }}/unsigned

      - name: Submit signing request to SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ needs.build.outputs.exe-artifact-id }}
          output-artifact-directory: ${{ github.workspace }}/signed
          wait-for-completion: true

      - name: Copy signed executable and PDB files to Workspace root
        shell: bash
        run: |
          cp \
            "${{ github.workspace }}/signed/${{ env.TAURI_PRODUCT_NAME }}.exe" \
            "${{ github.workspace }}/${{ env.TAURI_PRODUCT_NAME }}.exe"
          cp \
            "${{ github.workspace }}/unsigned/${{ env.TAURI_PRODUCT_NAME }}.pdb" \
            "${{ github.workspace }}/${{ env.TAURI_PRODUCT_NAME }}.pdb"
          echo "Signed executable and PDB files copied to workspace root"
          find "${{ github.workspace }}" -maxdepth 1 -type f -name "${{ env.TAURI_PRODUCT_NAME }}.*"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: HoYo.Gacha-git-${{ github.ref_name }}
          path: |
            ${{ github.workspace }}/README.md
            ${{ github.workspace }}/LICENSE-APACHE
            ${{ github.workspace }}/LICENSE-MIT
            ${{ github.workspace }}/${{ env.TAURI_PRODUCT_NAME }}.exe
            ${{ github.workspace }}/${{ env.TAURI_PRODUCT_NAME }}.pdb

      - name: Create Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            ${{ github.workspace }}/${{ env.TAURI_PRODUCT_NAME }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
